<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hookah Map</title>
  <link rel="icon" href="image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💨</text></svg>">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Фон (нижний слой) -->
  <div id="app-bg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-size: cover; background-position: center;"></div>

  <!-- Меню (поверх фона) -->
  <nav class="tabs" style="position: fixed; top: 0; left: 0; width: 100%; z-index: 100;">
    <button id="tab-map" class="active">📍 Карта</button>
    <button id="tab-mixes">💨 Миксы</button>
    <button id="tab-book">📞 Бронь</button>
  </nav>

  <!-- КОНТЕНТ (поверх фона и меню) -->
  <div style="position: relative; z-index: 5; margin-top: 48px; height: calc(100vh - 48px);">
    
    <!-- СТРАНИЦА 1: КАРТА -->
    <div id="page-map" class="page active">
      <div id="tables-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
    </div>

    <!-- СТРАНИЦА 2: МИКСЫ -->
    <div id="page-mixes" class="page hidden">
      <div class="glass-panel">
        <h2 class="page-title">🍃 Готовые миксы</h2>
        <div id="mixes-list" class="list-container"></div>
      </div>
    </div>

    <!-- СТРАНИЦА 3: БРОНЬ -->
    <div id="page-book" class="page hidden">
      <div class="glass-panel">
        <h2 class="page-title">📞 Забронировать</h2>
        <p style="text-align:center; color:#aaa; margin:20px 0;">Напишите нам для брони:</p>
        <div class="buttons-row">
          <a href="https://wa.me/905338862150" class="btn btn-whatsapp">WhatsApp</a>
          <a href="https://zalo.me/84347991470" class="btn btn-zalo">Zalo</a>
        </div>
      </div>
    </div>
    
  </div>

  <script src="app.js"></script>
</body>
</html>
