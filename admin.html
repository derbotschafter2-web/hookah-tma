<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка кальянной</title>
  <!-- Подключаем библиотеку Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; margin: 0; }
    .hidden { display: none; }
    input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; width: 100%; box-sizing: border-box; }
    button { background: #0088cc; cursor: pointer; font-weight: bold; }
    button:hover { opacity: 0.9; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 20px; }
    .card { background: #252525; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
    h2 { margin-top: 0; }
    .hint { color: #aaa; font-size: 0.9em; margin-bottom: 15px; }
  </style>
</head>
<body>

  <!-- 1. Экран входа (виден сразу) -->
  <div id="login-screen">
    <h2>🔐 Вход для персонала</h2>
    <input type="password" id="admin-pass" placeholder="Введите пароль администратора">
    <button onclick="checkPassword()" style="margin-top: 10px;">Войти</button>
    <p id="error-msg" style="color:#e74c3c; margin-top:10px; display:none;">❌ Неверный пароль</p>
  </div>

  <!-- 2. Панель управления (скрыта до правильного пароля) -->
  <div id="admin-panel" class="hidden">
    <h2>📊 Управление столами</h2>
    <p class="hint">Выберите статус. Карта у клиентов обновится мгновенно.</p>
    <div id="tables-admin" class="grid"></div>
    <button onclick="logout()" style="background:#e74c3c; margin-top:25px;">🚪 Выйти</button>
  </div>

  <script>
    // ⚙️ 1. Подключение к твоей базе данных (вставь свои ключи!)
    const SUPABASE_URL = 'https://stwgqinqdrbbxgzhsyog.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_vjEzyQgNLOd0Cw_QK6PzHg_S8l60xIU';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 🔑 2. Пароль для доступа (поменяй на свой сложный!)
    const ADMIN_PASSWORD = '12345'; 

    // Проверка пароля
    function checkPassword() {
      const input = document.getElementById('admin-pass').value;
      if (input === ADMIN_PASSWORD) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        loadTables(); // Загружаем столы только после входа
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    }

    // Загрузка столов из базы
    async function loadTables() {
      const { data, error } = await supabase.from('tables').select('*').order('number');
      if (error) return alert('Ошибка загрузки таблицы');
      renderAdminGrid(data);
    }

    // Отрисовка карточек
    function renderAdminGrid(tables) {
      const container = document.getElementById('tables-admin');
      container.innerHTML = '';
      tables.forEach(t => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <strong style="font-size:1.1em;">Стол ${t.number}</strong>
          <select class="status-select" data-id="${t.id}" style="margin-top:10px;">
            <option value="free" ${t.status==='free'?'selected':''}>🟢 Свободен</option>
            <option value="reserved" ${t.status==='reserved'?'selected':''}>🟡 Забронирован</option>
            <option value="occupied" ${t.status==='occupied'?'selected':''}>🔴 Занят</option>
          </select>
        `;
        container.appendChild(card);
      });

      // Навешиваем "слушатель" на каждый выпадающий список
      document.querySelectorAll('.status-select').forEach(select => {
        select.addEventListener('change', async (e) => {
          const tableId = e.target.dataset.id;
          const newStatus = e.target.value;
          
          // Отправляем обновление в базу
          const { error } = await supabase.from('tables').update({ status: newStatus }).eq('id', tableId);
          if (!error) {
            alert(`✅ Статус стола обновлён`);
          } else {
            alert(`❌ Ошибка: ${error.message}`);
          }
        });
      });
    }

    // Выход (просто перезагружаем страницу)
    function logout() {
      location.reload();
    }
  </script>
</body>
</html>
